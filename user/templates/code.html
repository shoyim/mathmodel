                        <button class="copy-btn" onclick="copyCode('code_1')">Copy</button>
                        <textarea id="code_1" class="form-control" rows="100"> function filtration; % Bu dastur vaqt buyicha ikkinchi tartibli kasr hosila va 
                            %vaqt bouyicha birinchi tartibli kasr hosilalarni hisoblaydi. 
                           
                           k0=1e-13;  myu0=1e-2;       
                           P0=5e+5;   bet_y=3e-10;  
                           
                           tMax=3600;
                           
                           lv=0;     lp=500;
                           betta= 1;    alf= 1;
                           
                           bet=1+betta;                 
                           
                           tau=10; h=0.05;  L=40;          
                           T=tMax/tau+1;          
                           N=L/h + 1;   
                           
                           %Boshlang'ich va chegaraviy shartlar
                           P(1:T,1)=P0;     
                           P(1,1:N)=0;    
                           P(1:T,N)=0;  
                           U(1:T,1:N)=0; 
                           kap=k0/(myu0*bet_y);
                           
                           
                           for i=1:N 
                               P(2,i)=P(1,i); 
                           end;
                               kv=lv/((tau^bet)*gamma(3-bet));
                               kp=lp/((tau^alf)*(h^2)*gamma(2-alf));
                               
                               kv1=lv/((tau^betta)*gamma(2-betta));   %tezlik
                               kp2=lp/((tau^alf)*gamma(2-alf));   %tezlik
                               
                               A=kap/h^2+kap*kp;
                               B=1/tau+kv+2*kap/h^2+2*kap*kp; 
                               C=kap/h^2+kap*kp;   
                               alpha(2)=0; beta(2)=P0; 
                              
                              for j=2:T-1
                           
                                 for i=2:N-1  
                                     
                                          sv= 0 ; 
                                        for k=2:j-1
                                         sv=sv+(P(k+1,i)-2*P(k,i)+P(k-1,i))*((j-k+1)^(2-bet)-(j-k)^(2-bet)); 
                                        end;
                                           
                                         sp1= 0 ; sp2= 0 ; sp3= 0 ;  st=0;
                                        for k=1:j-1
                                            sp1 = sp1+(P(k+1,i+1)-P(k,i+1))*((j-k+1)^(1-alf)-(j-k)^(1-alf));
                                            sp2 = sp2+(P(k+1,i)-P(k,i))*((j-k+1)^(1-alf)-(j-k)^(1-alf));
                                            sp3 = sp3+(P(k+1,i-1)-P(k,i-1))*((j-k+1)^(1-alf)-(j-k)^(1-alf)); 
                                            st = st+(U(k+1,i)-U(k,i))*((j-k+1)^(1-betta)-(j-k)^(1-betta));       %tezlik
                                        end;
                                   
                                 end
                                      for i=2:N-1 
                                     F=(P(j,i)/tau-kv*sv+2*kv*P(j,i)-kv*P(j-1,i)+kp*kap*sp1-kap*kp*P(j,i+1)-2*kap*kp*sp2+2*kap*kp*P(j,i)+kap*kp*sp3-kap*kp*P(j,i-1));         
                                     
                                     alpha(i+1)=C/(B-A*alpha(i));       
                                     beta(i+1)=(F+A*beta(i))/(B-A*alpha(i));              
                                      end
                                   P(j+1,N)=0;   
                                   for i=N-1:-1:1     
                                           P(j+1,i)=alpha(i+1)*P(j+1,i+1)+ beta(i+1);     
                                   end    
                                   for i=1:N-1 
                                       U(j+1,i)=abs((-k0*(P(j+1,i+1)-P(j+1,i)+kp2*(sp1+P(j+1,i+1)-P(j,i+1)-sp2-P(j+1,i)+P(j,i)))/(myu0*h*(1+kv1)))-(kv1*st-kv1*U(j,i))/(1+kv1));  %tezlik
                                   end
                                       U(j+1,N) = U(j+1,N-1);   %tezlik
                                 j  
                                end;  
                           
                           %U(T-2,1:N)'   %tezlik
                           P(T-2,1:N)'
                           %plot((0:N-1)*h,abs(U(T-1,1:N))); % tezlik 
                           plot((0:N-1)*h,P(T-1,1:N))
                           format long;
                           hold on;
                        </textarea>

                        <textarea id="code_2" rows="100" class="form-control"> function filtration; % Bu dastur vaqt buyicha ikkinchi tartibli kasr hosila va 
                            %vaqt bouyicha birinchi tartibli kasr hosilalarni hisoblaydi. 
                           
                           k0=1e-13;  myu0=1e-2;     
                           Pc=150e+5;   Pk=200e+5;   bet_y=3e-10; 
                           
                           tMax=3600;
                           
                           lv=1000;         lp=500;
                           betta= 0.7;      alf= 1;
                           
                           bet=1+betta;                 
                           
                           tau=100;  h=0.05;   L=40;          
                           T=tMax/tau+1;          
                           N=L/h + 1;   
                           
                           rc = 0.1;
                           Nc = floor(rc/h)+1;
                           
                           %Boshlang'ich va chegaraviy shartlar
                           P(1:T,1:Nc)=Pc;     %chegaraviy shart chap taraf 
                           P(1,Nc:N)=Pk;       % boshlangich shart1
                           P(1:T,N)=Pk;        %chegaraviy shart ong taraf
                           U(1:T,1:N)=0;       % bu joyi xato tekshir
                           kap=k0/(myu0*bet_y);
                           
                           
                           for i=4:N 
                               P(2,i)=P(1,i); % bu joyi xato tekshir   "-"
                           end;
                               kv=lv/((tau^bet)*gamma(3-bet));
                               kp=lp/((tau^alf)*(h^2)*gamma(2-alf));
                               
                               kv1=lv/((tau^betta)*gamma(2-betta));   %tezlik
                               kp2=lp/((tau^alf)*gamma(2-alf));   %tezlik
                                   
                           
                              for j=2:T-1
                           
                                 for i=4:N-1  
                                     
                                          sv= 0; 
                                        for k=2:j-1
                                         sv=sv+(P(k+1,i)-2*P(k,i)+P(k-1,i))*((j-k+1)^(2-bet)-(j-k)^(2-bet)); 
                                        end;
                                           
                                         sp1= 0 ; sp2= 0 ; sp3= 0 ;  st=0;
                                        for k=1:j-1
                                            sp1 = sp1+(P(k+1,i+1)-P(k,i+1))*((j-k+1)^(1-alf)-(j-k)^(1-alf));
                                            sp2 = sp2+(P(k+1,i)-P(k,i))*((j-k+1)^(1-alf)-(j-k)^(1-alf));
                                            sp3 = sp3+(P(k+1,i-1)-P(k,i-1))*((j-k+1)^(1-alf)-(j-k)^(1-alf)); 
                                            st = st+(U(k+1,i)-U(k,i))*((j-k+1)^(1-betta)-(j-k)^(1-betta));       %tezlik
                                        end;
                                   
                                 end
                                 alpha(5)=0;   beta(5)=Pc;
                                      for  i=5:N-1 
                                           r1=(2*i*h-h)/2;
                                           r0=(2*i*h-3*h)/2;
                                               A=kap*(r0/h^2+kp*r0)/((i-1)*h);  
                                               B=kap*((r1+r0)/h^2+kp*(r1+r0))/((i-1)*h)+kv+1/tau; 
                                               C=kap*(r1/h^2+kp*r1)/((i-1)*h); 
                                     F=P(j,i)/tau-kv*sv+2*kv*P(j,i)-kv*P(j-1,i)+(kap*kp*r1*sp1)/((i-1)*h)-(kap*kp*r1*P(j,i+1))/((i-1)*h)-(kap*kp*(r0+r1)*sp2)/((i-1)*h)+(kap*kp*(r1+r0)*P(j,i))/((i-1)*h)+(kap*kp*r0*sp3)/((i-1)*h)-(kap*kp*r0*P(j,i-1))/((i-1)*h) ;         
                                     
                                     alpha(i+1)=C/(B-A*alpha(i));       
                                     beta(i+1)=(F+A*beta(i))/(B-A*alpha(i));              
                                      end
                                     
                                   for i=N-1:-1:4     
                                           P(j+1,i)=alpha(i+1)*P(j+1,i+1)+ beta(i+1);     
                                   end    
                                   for i=3:N-1 
                                       U(j+1,i)=abs((k0*(P(j+1,i+1)-P(j+1,i)+kp2*(sp1+P(j+1,i+1)-P(j,i+1)-sp2-P(j+1,i)+P(j,i)))/(myu0*h*(1+kv1)))-(kv1*st-kv1*U(j,i))/(1+kv1));  %tezlik
                                   end
                                       U(j+1,N) = U(j+1,N-1);   %tezlik
                                 j  
                                end;  
                           
                           %U(T-2,1:N)'   %tezlik
                           P(T-2,1:N)'
                           %plot((0:N-1)*h,abs(U(T-1,1:N))); % tezlik 
                           plot((0:N-1)*h,P(T-1,1:N))
                           format long;
                           hold on;</textarea>
                    </div>

                    <div class="tab-pane" id="tab_3">
                        <button class="copy-btn" onclick="copyCode('code_3')">Copy</button>
                        <textarea id="code_3" rows="100" class="form-control">  function filtration; % Bu dastur vaqt buyicha ikkinchi tartibli kasr hosila va 
                            %vaqt bouyicha birinchi tartibli kasr hosilalarni hisoblaydi. 
                           
                           k0=1e-14;  myu0= 1.768e-3;       
                           P0=5e+5;   bet_y=3e-8;  
                           
                           tMax=1800;     
                           lv=100;        lp=500;
                           betta= 0.9;    alf= 0.7;
                           
                           bet=1+betta;                 
                           
                           g0=1e+5;
                           
                           tau=10;  h=0.05;  L=5;          
                           T=tMax/tau+1;          
                           N=L/h + 1;   
                           
                           dx(1:T,1:N)=0;
                           %Boshlang'ich va chegaraviy shartlar
                           P(1:T,1)=P0;     
                           P(1,1:N)=0;    
                           P(1:T,N)=0;  
                           U(1:T,1:N)=0; 
                           vaqt(1:N) = 0;
                           
                           kap=k0/(myu0*bet_y);
                           
                           
                           for i=1:N 
                               P(2,i)=P(1,i); 
                           end;
                               kv=lv/((tau^bet)*gamma(3-bet));
                               kp=lp/((tau^alf)*(h^2)*gamma(2-alf));
                               
                               kv1=lv/((tau^betta)*gamma(2-betta));   %tezlik
                               kp2=lp/((tau^alf)*gamma(2-alf));   %tezlik
                               
                               A=kap/h^2+kap*kp;
                               B=1/tau+kv+2*kap/h^2+2*kap*kp; 
                               C=kap/h^2+kap*kp;   
                               alpha(2)=0; beta(2)=P0; 
                              
                              for j=2:T-1
                           
                                 for i=2:N-1  
                                     
                                          sv= 0 ; 
                                        for k=2:j-1
                                         sv=sv+(P(k+1,i)-2*P(k,i)+P(k-1,i))*((j-k+1)^(2-bet)-(j-k)^(2-bet)); 
                                        end;
                                           
                                         sp1= 0 ; sp2= 0 ; sp3= 0 ;  st=0;
                                        for k=1:j-1
                                            sp1 = sp1+(P(k+1,i+1)-P(k,i+1))*((j-k+1)^(1-alf)-(j-k)^(1-alf));
                                            sp2 = sp2+(P(k+1,i)-P(k,i))*((j-k+1)^(1-alf)-(j-k)^(1-alf));
                                            sp3 = sp3+(P(k+1,i-1)-P(k,i-1))*((j-k+1)^(1-alf)-(j-k)^(1-alf)); 
                                            st = st+(U(k+1,i)-U(k,i))*((j-k+1)^(1-betta)-(j-k)^(1-betta));       %tezlik
                           
                                        end;
                                   
                                 end
                                      for i=2:N-1 
                                     F=(P(j,i)/tau-kv*sv+2*kv*P(j,i)-kv*P(j-1,i)+kp*kap*sp1-kap*kp*P(j,i+1)-2*kap*kp*sp2+2*kap*kp*P(j,i)+kap*kp*sp3-kap*kp*P(j,i-1));         
                                     
                                     alpha(i+1)=C/(B-A*alpha(i));       
                                     beta(i+1)=(F+A*beta(i))/(B-A*alpha(i));              
                                      end
                                   %P(j+1,N)=0;   
                                   for i=N-1:-1:2     
                                           P(j+1,i)=alpha(i+1)*P(j+1,i+1)+ beta(i+1);     
                                   end
                                   for i=1:N-1
                                       dx(j+1,i)=abs((P(j+1,i+1)-P(j+1,i))/h);
                                   end
                                   %dx(N)=dx(N-1);
                                   for i=3:N-1
                                       if abs((P(j+1,i)-P(j+1,i-1))/h)>g0
                                           if (P(j+1,i)-P(j+1,i-1))/h>0
                                            
                                              U(j+1,i)=abs((-k0*(P(j+1,i+1)-P(j+1,i)-g0*h+kp2*(sp1+P(j+1,i+1)-P(j,i+1)-sp2-P(j+1,i)+P(j,i)))/(myu0*h*(1+kv1)))-(kv1*st-kv1*U(j,i))/(1+kv1));  %tezlik
                                              if j == T-1
                                                  i
                                                end;
                                           else
                                             
                                               U(j+1,i)=abs((-k0*(g0*h+(P(j+1,i+1)-P(j+1,i))+kp2*(sp1+P(j+1,i+1)-P(j,i+1)-sp2-P(j+1,i)+P(j,i)))/(myu0*h*(1+kv1)))-(kv1*st-kv1*U(j,i))/(1+kv1));
                                              
                                           end;
                                       else
                                         
                                         U(j+1,i)=abs(-(kv1*st-kv1*U(j,i))/(1+kv1)); 
                                          
                                       end;
                                   end
                                       U(j+1,N) = U(j+1,N-1);   %tezlik
                                        
                                 j  
                                 
                                 for i=1:N-1
                                    if  (dx(j+1,i)>=g0 && vaqt(i) == 0)
                                        vaqt(i)=j*tau;
                                    end;
                                    end;
                                end;  
                           
                           U(T-2,1:N)'   %tezlik 
                           %P(T-1,1:N)'
                           plot((0:N-1)*h,abs(U(T-2,1:N)));   % tezlik 
                           %plot((0:N-1)*h,P(T-1,1:N))'
                           %plot((0:N-2)*h,dx(T-1,1:N-1))'
                           %dx(T-2,1:N)'
                           %U(1:T,9)                        %tezlik ni masofa boyicha chiqarish
                           %plot((0:T-1)*tau,U(1:T,9));     % tezlik ni masofa boyicha chiqarish 
                           %plot((0:N-2)*h,vaqt(1:N-1));     % tezlik vaqtini topish
                           %vaqt'                            % tezlik vaqtini topish
                           
                           format long;
                           hold on;</textarea>
                    </div>
                    <!-- /.tab-pane -->
                </div>
                <!-- /.tab-content -->

<script>
    const textarea = document.querySelector('textarea');

    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    });
    function copyCode(id) {
        let textarea = document.getElementById(id);
        console.log(textarea)
        if (textarea && textarea.dataset.cmInstance) {
            let editor = textarea.dataset.cmInstance;
            let text = editor.getValue(); // CodeMirror tarkibini olish

            navigator.clipboard.writeText(text).then(() => {
                alert("Copied!");
            }).catch(err => {
                console.error("Copy failed:", err);
            });
        }
    }
</script>
